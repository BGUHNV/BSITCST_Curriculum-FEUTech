<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSITCST Smart Planner & Scheduler</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-color: #e0e0e0;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary-color); margin-bottom: 5px; font-size: 1.8rem; }
        h3 { font-size: 1rem; color: #666; }

        /* Dashboard Stats */
        .dashboard-stats {
            background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px; display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .stat-item { text-align: center; min-width: 100px; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: var(--accent-color); display: block; }
        .stat-label { font-size: 0.8em; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 10px; margin-top: 5px; height: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background-color: var(--accent-color); width: 0%; transition: width 0.5s ease-in-out; text-align: center; line-height: 20px; color: white; font-size: 0.8em; }

        /* Year/Term Layout */
        .year-section { margin-bottom: 30px; }
        .year-title { background-color: var(--primary-color); color: white; padding: 10px 15px; border-radius: 8px 8px 0 0; margin: 0; font-size: 1.1rem; }
        .term-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; background: #e8eef1; padding: 15px; border-radius: 0 0 8px 8px; }
        .term-card { background: var(--card-bg); border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
        .term-header { background-color: var(--accent-color); color: white; padding: 8px 12px; font-weight: bold; display: flex; justify-content: space-between; font-size: 0.9rem; }

        /* Tables */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; min-width: 400px; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .status-passed { background-color: #d4edda; color: #155724; }
        .status-failed { background-color: #f8d7da; color: #721c24; }

        .btn { padding: 5px 10px; cursor: pointer; border: 1px solid #ddd; background: white; border-radius: 3px; font-size: 0.85em; margin-left: 2px;}
        .btn-pass:hover, .active-pass { background: #28a745; color: white; border-color: #28a745; }
        .btn-fail:hover, .active-fail { background: #dc3545; color: white; border-color: #dc3545; }

        .controls { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        input[type="text"] { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button.reset-btn { padding: 10px 15px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>BS Information Technology</h1>
        <h3>Smart Scheduler & Planner (CST Curriculum)</h3>
    </header>

    <div class="dashboard-stats">
        <div class="stat-item"><span class="stat-value" id="totalUnitsCompleted">0</span><span class="stat-label">Units Completed</span></div>
        <div class="stat-item"><span class="stat-value" id="totalUnitsRequired">0</span><span class="stat-label">Total Required</span></div>
        <div class="stat-item"><span class="stat-value" id="completionPercentage">0%</span><span class="stat-label">Progress</span></div>
        <div class="progress-container"><div class="progress-bar" id="overallProgressBar">0%</div></div>
    </div>

    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search curriculum table...">
        <button class="reset-btn" onclick="resetData()">Reset All Progress</button>
    </div>

    <div id="curriculum-root"></div>
</div>

<script>
    const curriculumData = [
        {
            year: "FIRST YEAR",
            terms: [
                {
                    name: "1st Term",
                    courses: [
                        { code: "CCS0003", title: "COMPUTER PROGRAMMING 1 (LEC)", units: 2, pre: [] },
                        { code: "CCS0003L", title: "COMPUTER PROGRAMMING 1 (LAB)", units: 1, pre: [] },
                        { code: "GED0004", title: "PHYSICAL EDUCATION 1", units: 3, pre: [] },
                        { code: "GED0006", title: "PERSONAL AND PROFESSIONAL EFFECTIVENESS", units: 2, pre: [] },
                        { code: "GED0009", title: "READINGS IN PHILIPPINE HISTORY", units: 3, pre: [] },
                        { code: "GED0011", title: "SCIENCE, TECHNOLOGY AND SOCIETY", units: 3, pre: [] },
                        { code: "CCS0001", title: "INTRODUCTION TO COMPUTING (LEC)", units: 2, pre: [] },
                        { code: "CCS0001L", title: "INTRODUCTION TO COMPUTING (LAB)", units: 1, pre: [] }
                    ]
                },
                {
                    name: "2nd Term",
                    courses: [
                        { code: "NSTP1", title: "CIVIC WELFARE TRAINING SERVICE 1", units: 0, pre: [] },
                        { code: "IT0002", title: "USER DESIGN FUNDAMENTALS", units: 1, pre: [] },
                        { code: "GED0085", title: "GENDER AND SOCIETY", units: 3, pre: [] },
                        { code: "GED0027", title: "MATHEMATICS IN THE MODERN WORLD", units: 3, pre: [] },
                        { code: "GED0015", title: "PHYSICAL EDUCATION 2", units: 3, pre: ["GED0004"] },
                        { code: "GED0001", title: "SPECIALIZED ENGLISH PROGRAM 1", units: 3, pre: [] },
                        { code: "CCS0007", title: "COMPUTER PROGRAMMING 2 (LEC)", units: 2, pre: ["CCS0003", "CCS0003L"] },
                        { code: "CCS0007L", title: "COMPUTER PROGRAMMING 2 (LAB)", units: 1, pre: ["CCS0003", "CCS0003L"] }
                    ]
                }
            ]
        },
        {
            year: "SECOND YEAR",
            terms: [
                {
                    name: "1st Term",
                    courses: [
                        { code: "IT0017", title: "DISCRETE MATHEMATICS", units: 3, pre: ["GED0027"] },
                        { code: "CCS0023", title: "OBJECT ORIENTED PROGRAMMING (LEC)", units: 2, pre: ["CCS0007", "CCS0007L"] },
                        { code: "CCS0023L", title: "OBJECT ORIENTED PROGRAMMING (LAB)", units: 1, pre: ["CCS0007", "CCS0007L"] },
                        { code: "GED0019", title: "UNDERSTANDING THE SELF", units: 3, pre: [] },
                        { code: "GED0021", title: "SPECIALIZED ENGLISH PROGRAM 2", units: 3, pre: ["GED0001"] },
                        { code: "IT0019", title: "QUANTITATIVE METHODS (INCL MODELING AND SIMULATION)", units: 3, pre: [] },
                        { code: "IT0051", title: "IT ELECTIVE - HUMAN COMPUTER INTERACTION 2", units: 3, pre: [] },
                        { code: "IT0119", title: "INFORMATION MANAGEMENT", units: 2, pre: [] },
                        { code: "IT0119L", title: "INFORMATION MANAGEMENT (LAB)", units: 1, pre: [] }
                    ]
                }
            ]
        }
    ];

    let courseStatus = JSON.parse(localStorage.getItem('bsit_smart_tracker_v3')) || {};
    const root = document.getElementById('curriculum-root');

    function saveState() {
        localStorage.setItem('bsit_smart_tracker_v3', JSON.stringify(courseStatus));
        renderCurriculum(document.getElementById('searchBar').value);
    }

    function resetData() {
        if(confirm("Reset all data?")) { courseStatus = {}; saveState(); }
    }

    function setStatus(code, status) {
        if (courseStatus[code] === status) { delete courseStatus[code]; } 
        else { courseStatus[code] = status; }
        saveState();
    }

    function renderCurriculum(filterText = '') {
        root.innerHTML = '';
        let totalUnitsAll = 0;
        let completedUnitsAll = 0;

        // Global stats calculation
        curriculumData.forEach(y => y.terms.forEach(t => t.courses.forEach(c => {
            totalUnitsAll += c.units;
            if (courseStatus[c.code] === 'passed') completedUnitsAll += c.units;
        })));

        document.getElementById('totalUnitsCompleted').textContent = completedUnitsAll;
        document.getElementById('totalUnitsRequired').textContent = totalUnitsAll;
        let percentage = totalUnitsAll > 0 ? Math.round((completedUnitsAll / totalUnitsAll) * 100) : 0;
        document.getElementById('overallProgressBar').style.width = percentage + "%";
        document.getElementById('overallProgressBar').textContent = percentage + "%";
        document.getElementById('completionPercentage').textContent = percentage + "%";

        const lowerFilter = filterText.toLowerCase();

        curriculumData.forEach(yearData => {
            const yearSection = document.createElement('div');
            yearSection.className = 'year-section';
            yearSection.innerHTML = `<h2 class="year-title">${yearData.year}</h2>`;
            
            const termContainer = document.createElement('div');
            termContainer.className = 'term-container';

            yearData.terms.forEach(term => {
                const filteredCourses = term.courses.filter(c => 
                    c.code.toLowerCase().includes(lowerFilter) || c.title.toLowerCase().includes(lowerFilter)
                );

                if (filteredCourses.length > 0) {
                    const termCard = document.createElement('div');
                    termCard.className = 'term-card';

                    // --- UNIT CALCULATION FIX ---
                    const termTotal = term.courses.reduce((sum, c) => sum + c.units, 0);
                    const termPassed = term.courses.reduce((sum, c) => {
                        return courseStatus[c.code] === 'passed' ? sum + c.units : sum;
                    }, 0); // Correctly initialized to 0

                    termCard.innerHTML = `<div class="term-header"><span>${term.name}</span><span>${termPassed}/${termTotal} units</span></div>`;
                    
                    const tableWrap = document.createElement('div');
                    tableWrap.className = 'table-responsive';
                    const table = document.createElement('table');
                    table.innerHTML = `<thead><tr><th>Code</th><th>Title</th><th>Units</th><th>Actions</th></tr></thead>`;
                    const tbody = document.createElement('tbody');

                    filteredCourses.forEach(c => {
                        const status = courseStatus[c.code];
                        const tr = document.createElement('tr');
                        if (status === 'passed') tr.className = 'status-passed';
                        if (status === 'failed') tr.className = 'status-failed';

                        tr.innerHTML = `
                            <td><strong>${c.code}</strong></td>
                            <td>${c.title}</td>
                            <td style="text-align:center">${c.units}</td>
                            <td style="text-align:right">
                                <button class="btn btn-pass ${status === 'passed' ? 'active-pass' : ''}" onclick="setStatus('${c.code}', 'passed')">Pass</button>
                                <button class="btn btn-fail ${status === 'failed' ? 'active-fail' : ''}" onclick="setStatus('${c.code}', 'failed')">Fail</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                    table.appendChild(tbody);
                    tableWrap.appendChild(table);
                    termCard.appendChild(tableWrap);
                    termContainer.appendChild(termCard);
                }
            });
            yearSection.appendChild(termContainer);
            root.appendChild(yearSection);
        });
    }

    document.getElementById('searchBar').addEventListener('input', (e) => renderCurriculum(e.target.value));
    renderCurriculum();
</script>
</body>
</html>
